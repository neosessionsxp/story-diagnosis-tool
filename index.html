<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Story Diagnosis Tool — Tin House Press</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One:ital@0;1&family=Open+Sans+Condensed:wght@300;700&family=Open+Sans:ital,wght@0,300;0,400;0,600;1,400&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --surface:   #f7f7f7;
    --border:    #e0e0e0;
    --amber:     #c0392b;
    --amber-dim: #922b21;
    --cream:     #1a1a1a;
    --muted:     #666666;
    --text:      #333333;
    --green:     #1a7a4a;
    --red:       #c0392b;
    --radius:    4px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-weight: 400;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    border-bottom: 3px solid var(--amber);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--amber);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Chau Philomene One', sans-serif;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
    font-weight: 400;
  }
  .logo-text {
    font-family: 'Chau Philomene One', sans-serif;
    font-size: 17px;
    color: #1a1a1a;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 400;
  }
  .logo-text span { color: var(--amber); }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 64px 24px 48px;
    max-width: 700px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 16px;
    font-family: 'Chau Philomene One', sans-serif;
    font-weight: 400;
  }
  .hero h1 {
    font-family: 'Open Sans', sans-serif;
    font-size: clamp(34px, 5.5vw, 54px);
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.15;
    margin-bottom: 18px;
  }
  .hero h1 em { font-style: italic; color: var(--amber); }
  .hero p {
    font-size: 16px;
    color: var(--muted);
    max-width: 520px;
    margin: 0 auto;
  }

  /* ── PHASE INDICATOR ── */
  .phases {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 0 auto 48px;
    max-width: 500px;
    padding: 0 24px;
  }
  .phase-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  .phase-step.active { color: #1a1a1a; font-weight: 500; }
  .phase-step.done { color: var(--amber); }
  .phase-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    color: var(--muted);
  }
  .phase-step.active .phase-dot {
    border-color: var(--amber);
    background: var(--amber);
    color: var(--bg);
  }
  .phase-step.done .phase-dot {
    border-color: var(--amber);
    color: var(--amber);
    background: transparent;
  }
  .phase-line {
    flex: 1;
    height: 1px;
    background: var(--border);
    margin: 0 12px;
  }

  /* ── MAIN CONTAINER ── */
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px 80px;
    border-left: 1px solid var(--amber);
    border-right: 1px solid var(--amber);
  }

  /* ── FORM ── */
  .card {
    background: #efefef;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .field { margin-bottom: 28px; }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #1a1a1a;
    margin-bottom: 6px;
    font-family: 'Chau Philomene One', sans-serif;
    font-weight: 400;
  }
  .field .hint {
    font-size: 14px;
    color: #444;
    margin-bottom: 8px;
    font-style: normal;
    border-left: 3px solid var(--amber);
    padding-left: 8px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: var(--radius);
    color: #1a1a1a;
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px rgba(192,57,43,0.1);
  }
  .field input::placeholder, .field textarea::placeholder {
    color: #bbb;
    font-style: normal;
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
  }
  .field select option { background: #fff; color: #1a1a1a; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 560px) { .field-row { grid-template-columns: 1fr; } }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: var(--radius);
    font-family: 'PT Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.1s;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--amber);
    color: #fff;
    width: 100%;
    font-family: 'PT Sans', sans-serif;
    letter-spacing: 0.04em;
    font-size: 15px;
  }
  .btn-primary:hover { background: var(--amber-dim); opacity: 1; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--amber); color: var(--amber); }

  /* ── DIAGNOSIS RESULTS ── */
  .score-ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
  }
  .score-ring {
    position: relative;
    width: 140px; height: 140px;
    margin-bottom: 16px;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .score-num {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-num .num {
    font-family: 'Open Sans', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
  }
  .score-num .label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'Open Sans Condensed', sans-serif;
  }
  .verdict {
    font-family: 'PT Sans', sans-serif;
    font-size: 19px;
    font-style: italic;
    color: #1a1a1a;
    text-align: center;
    max-width: 560px;
    line-height: 1.4;
  }

  .section-heading {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    font-family: 'Chau Philomene One', sans-serif;
    font-weight: 400;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--amber);
  }

  .result-section { margin-bottom: 32px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.3);
    color: var(--amber);
    border-radius: 3px;
    padding: 4px 12px;
    font-size: 13px;
  }
  .tag.green {
    background: rgba(26,122,74,0.08);
    border-color: rgba(26,122,74,0.3);
    color: var(--green);
  }

  .issue-card {
    background: #fafafa;
    border: 1px solid #e8e8e8;
    border-left: 3px solid var(--red);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .issue-card .issue-title {
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
    font-size: 14px;
    font-family: 'Open Sans Condensed', sans-serif;
    letter-spacing: 0.03em;
  }
  .issue-card .issue-detail {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .issue-card .fix {
    font-size: 13px;
    color: var(--green);
    display: flex;
    gap: 8px;
    font-weight: 500;
  }
  .issue-card .fix::before { content: '→'; flex-shrink: 0; }

  .green-light-box {
    background: rgba(26,122,74,0.06);
    border: 1px solid rgba(26,122,74,0.25);
    border-radius: var(--radius);
    padding: 20px;
    font-size: 15px;
    color: #1a1a1a;
    line-height: 1.6;
  }

  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li {
    counter-increment: steps;
    display: flex;
    gap: 14px;
    margin-bottom: 12px;
    font-size: 14px;
    color: var(--text);
  }
  .steps-list li::before {
    content: counter(steps);
    background: var(--amber);
    color: #fff;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
    font-family: 'Open Sans Condensed', sans-serif;
  }

  /* ── PAYWALL ── */
  .paywall {
    background: #fff;
    border: 1px solid var(--border);
    border-top: 3px solid var(--amber);
    border-radius: 6px;
    padding: 40px;
    text-align: center;
    margin-top: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .paywall h3 {
    font-family: 'Chau Philomene One', sans-serif;
    font-size: 24px;
    color: #1a1a1a;
    margin-bottom: 12px;
  }
  .paywall p { color: var(--muted); margin-bottom: 24px; font-size: 15px; }
  .price-badge {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    background: rgba(192,57,43,0.07);
    border: 1px solid rgba(192,57,43,0.25);
    border-radius: 4px;
    padding: 8px 18px;
    margin-bottom: 24px;
  }
  .price-badge .dollar { font-size: 24px; color: var(--amber); font-weight: 700; font-family: 'PT Sans', sans-serif; }
  .price-badge .cents { font-size: 14px; color: var(--muted); }
  .paywall-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
    text-align: left;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }
  .paywall-features li {
    display: flex;
    gap: 10px;
    font-size: 14px;
    color: var(--text);
  }
  .paywall-features li::before { content: '✓'; color: var(--green); font-weight: 700; }

  .unlock-row { display: flex; align-items: center; gap: 16px; justify-content: center; flex-wrap: wrap; }

  /* ── COACH CHAT ── */
  .coach-panel {
    background: #fff;
    border: 1px solid var(--border);
    border-top: 3px solid var(--amber);
    border-radius: 6px;
    overflow: hidden;
    margin-top: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .coach-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fafafa;
  }
  .coach-header .coach-icon {
    width: 38px; height: 38px;
    background: rgba(192,57,43,0.1);
    border: 1px solid rgba(192,57,43,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .coach-header .coach-name {
    font-family: 'Chau Philomene One', sans-serif;
    font-size: 17px;
    color: #1a1a1a;
    letter-spacing: 0.04em;
    font-weight: 400;
  }
  .coach-header .coach-sub { font-size: 12px; color: var(--muted); }

  .chat-messages {
    padding: 24px 28px;
    min-height: 260px;
    max-height: 480px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .chat-msg { display: flex; gap: 12px; }
  .chat-msg.user { flex-direction: row-reverse; }
  .msg-bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .chat-msg.user .msg-bubble {
    background: rgba(192,57,43,0.07);
    border: 1px solid rgba(192,57,43,0.2);
    color: #1a1a1a;
    border-bottom-right-radius: 4px;
  }
  .chat-msg.assistant .msg-bubble {
    background: #f7f7f7;
    border: 1px solid #e8e8e8;
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }
  .chat-msg.user .msg-avatar { background: var(--amber); color: #fff; }
  .chat-msg.assistant .msg-avatar { background: #e8e8e8; color: #666; }

  .quick-prompts {
    padding: 0 28px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .quick-btn {
    background: #f7f7f7;
    border: 1px solid #ddd;
    border-radius: 20px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    font-family: 'Open Sans', sans-serif;
  }
  .quick-btn:hover { border-color: var(--amber); color: var(--amber); background: rgba(192,57,43,0.04); }

  .chat-input-row {
    padding: 16px 28px 24px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .chat-input-row input {
    flex: 1;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: var(--radius);
    color: #1a1a1a;
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input-row input:focus { border-color: var(--amber); }
  .btn-send {
    background: var(--amber);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    width: 42px; height: 42px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .btn-send:hover { background: var(--amber-dim); }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── FREE TAG ── */
  .free-tag {
    background: rgba(26,122,74,0.1);
    border: 1px solid rgba(26,122,74,0.3);
    border-radius: 3px;
    color: var(--green);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    font-weight: 500;
  }

  /* ── LOADING ── */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(192,57,43,0.25);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 60px 0;
    color: var(--muted);
    font-size: 15px;
  }
  .loading-state .big-spinner {
    width: 40px; height: 40px;
    border-width: 3px;
  }

  /* ── ERROR ── */
  .error-box {
    background: rgba(192,57,43,0.07);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: var(--radius);
    padding: 14px 18px;
    color: var(--red);
    font-size: 14px;
    margin-top: 16px;
  }

  /* ── DIVIDER ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 32px 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    background: #fafafa;
  }
  footer a { color: var(--amber); text-decoration: none; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── Score Ring ──────────────────────────────────────────────────────────────
function ScoreRing({ score }) {
  const r = 58, cx = 70, cy = 70;
  const circ = 2 * Math.PI * r;
  const fill = circ - (circ * score / 100);
  const color = score >= 80 ? '#1a7a4a' : score >= 60 ? '#c0392b' : score >= 40 ? '#d35400' : '#922b21';
  return (
    <div className="score-ring-wrap">
      <div className="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e8e8e8" strokeWidth="8" />
          <circle
            cx={cx} cy={cy} r={r} fill="none"
            stroke={color} strokeWidth="8"
            strokeDasharray={circ}
            strokeDashoffset={fill}
            strokeLinecap="round"
            style={{ transition: 'stroke-dashoffset 1s ease' }}
          />
        </svg>
        <div className="score-num">
          <span className="num" style={{ color: '#1a1a1a' }}>{score}</span>
          <span className="label">Viability</span>
        </div>
      </div>
    </div>
  );
}

// ── Phase Indicator ─────────────────────────────────────────────────────────
function PhaseBar({ phase }) {
  // phase: 'form' | 'results' | 'coach'
  const steps = [
    { id: 'form', label: 'Story Details' },
    { id: 'results', label: 'Diagnosis' },
    { id: 'coach', label: 'Writing Coach' },
  ];
  const idx = steps.findIndex(s => s.id === phase);
  return (
    <div className="phases">
      {steps.map((s, i) => (
        <React.Fragment key={s.id}>
          {i > 0 && <div className="phase-line" />}
          <div className={`phase-step ${i < idx ? 'done' : i === idx ? 'active' : ''}`}>
            <div className="phase-dot">{i < idx ? '✓' : i + 1}</div>
            <span>{s.label}</span>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

// ── Diagnosis Form ──────────────────────────────────────────────────────────
function DiagnosisForm({ onResult }) {
  const [form, setForm] = useState({
    genre: '', stage: '', premise: '', protagonist: '', conflict: '', stakes: '', theme: ''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const canSubmit = form.genre && form.stage && form.premise.length > 20
    && form.protagonist.length > 10 && form.conflict.length > 10 && form.stakes.length > 10;

  async function submit() {
    setLoading(true); setError('');
    try {
      const res = await fetch('/api/diagnose', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      onResult(data, form);
    } catch (e) {
      setError(e.message || 'Something went wrong. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="card">
      <div className="field-row">
        <div className="field">
          <label>Genre</label>
          <select value={form.genre} onChange={e => set('genre', e.target.value)}>
            <option value="">Select genre…</option>
            {['Literary Fiction','Commercial Fiction','Mystery / Thriller','Romance','Science Fiction',
              'Fantasy','Historical Fiction','Horror','Young Adult','Middle Grade',
              'Memoir','Narrative Non-fiction','Self-Help','Other'].map(g => (
              <option key={g} value={g}>{g}</option>
            ))}
          </select>
        </div>
        <div className="field">
          <label>Writing Stage</label>
          <select value={form.stage} onChange={e => set('stage', e.target.value)}>
            <option value="">Select stage…</option>
            {['Idea / Concept','Outline / Planning','First Draft (early)','First Draft (complete)',
              'Revising','Polished Draft','Ready to Query'].map(s => (
              <option key={s} value={s}>{s}</option>
            ))}
          </select>
        </div>
      </div>

      <div className="field">
        <label>Premise</label>
        <div className="hint">One paragraph: what happens + why it matters</div>
        <textarea rows={4} placeholder="When [inciting incident], [protagonist] must [goal], or else [consequence]…"
          value={form.premise} onChange={e => set('premise', e.target.value)} />
      </div>

      <div className="field">
        <label>Protagonist</label>
        <div className="hint">Who they are + what they want externally + what they need internally</div>
        <textarea rows={3} placeholder="A 35-year-old forensic accountant who wants to expose corporate fraud but needs to learn…"
          value={form.protagonist} onChange={e => set('protagonist', e.target.value)} />
      </div>

      <div className="field">
        <label>Central Conflict</label>
        <div className="hint">The main force opposing your protagonist's goal</div>
        <textarea rows={3} placeholder="The antagonist/force, what they want, and why they're in direct opposition…"
          value={form.conflict} onChange={e => set('conflict', e.target.value)} />
      </div>

      <div className="field">
        <label>Stakes</label>
        <div className="hint">What does your protagonist stand to lose? Internal + external</div>
        <textarea rows={2} placeholder="If she fails, the corporation destroys her career — and she never learns to trust again…"
          value={form.stakes} onChange={e => set('stakes', e.target.value)} />
      </div>

      <div className="field">
        <label>Theme</label>
        <div className="hint">What is your story ultimately about — the human truth underneath the plot?</div>
        <textarea rows={2} placeholder="This is a story about the cost of silence, and what it means to finally speak…"
          value={form.theme} onChange={e => set('theme', e.target.value)} />
      </div>

      {error && <div className="error-box">{error}</div>}

      <button className="btn btn-primary" onClick={submit} disabled={loading || !canSubmit}>
        {loading ? <><span className="spinner" /> Diagnosing your story…</> : 'Run Story Diagnosis'}
      </button>

      {loading && (
        <div style={{ textAlign:'center', marginTop:20, fontSize:13, color:'var(--muted)' }}>
          Analysing premise strength, conflict architecture, and market viability…
        </div>
      )}
    </div>
  );
}

// ── Results ─────────────────────────────────────────────────────────────────
function DiagnosisResults({ data, form, onCoach }) {
  return (
    <div className="card">
      <ScoreRing score={data.score} />
      <p className="verdict">"{data.verdict}"</p>
      <hr className="divider" />

      <div className="result-section">
        <div className="section-heading">What's Working</div>
        <div className="tag-list">
          {data.whatsWorking.map((w, i) => <span key={i} className="tag green">{w}</span>)}
        </div>
      </div>

      <div className="result-section">
        <div className="section-heading">Critical Issues & Fixes</div>
        {data.critical.map((c, i) => (
          <div key={i} className="issue-card">
            <div className="issue-title">{c.issue}</div>
            <div className="issue-detail">{c.detail}</div>
            <div className="fix">{c.fix}</div>
          </div>
        ))}
      </div>

      <div className="result-section">
        <div className="section-heading">Green-Light Assessment</div>
        <div className="green-light-box">{data.greenLight}</div>
      </div>

      <div className="result-section">
        <div className="section-heading">Comparable Titles</div>
        <div className="tag-list">
          {data.comparables.map((c, i) => <span key={i} className="tag">{c}</span>)}
        </div>
      </div>

      <div className="result-section">
        <div className="section-heading">Next Steps</div>
        <ol className="steps-list">
          {data.nextSteps.map((s, i) => <li key={i}>{s}</li>)}
        </ol>
      </div>

      <hr className="divider" />
      <button className="btn btn-primary" onClick={onCoach}>
        Continue to Writing Coach →
      </button>
    </div>
  );
}

// ── Paywall ─────────────────────────────────────────────────────────────────
function Paywall({ onUnlock }) {
  const [step, setStep] = useState('pay'); // 'pay' | 'code'
  const [email, setEmail] = useState('');
  const [code, setCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [codeSent, setCodeSent] = useState(false);

  async function handlePaid() {
    if (!email || !email.includes('@')) { setError('Please enter the email you used for PayPal.'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch('/api/request-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setCodeSent(true);
      setStep('code');
    } catch (e) {
      setError(e.message || 'Failed to send code. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  async function handleVerify() {
    if (!code || code.length !== 6) { setError('Please enter your 6-digit code.'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch('/api/verify-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      onUnlock();
    } catch (e) {
      setError(e.message || 'Invalid code. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="paywall">
      <h3>Unlock Your Writing Coach</h3>
      <p>You've used your free coaching response.<br />Get unlimited coaching on this story for a one-time fee.</p>
      <div className="price-badge">
        <span className="dollar">$12</span>
        <span className="cents">USD · one-time</span>
      </div>
      <ul className="paywall-features">
        <li>Unlimited coaching session for this story</li>
        <li>Answers tailored to your specific premise</li>
        <li>Scene, structure, and character advice</li>
        <li>Covers from idea through query letter</li>
      </ul>

      {step === 'pay' && (
        <>
          <div className="unlock-row" style={{ flexDirection:'column', gap:16, alignItems:'center' }}>
            <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
              <input type="hidden" name="cmd" value="_s-xclick" />
              <input type="hidden" name="hosted_button_id" value="5343AJGX52X52" />
              <button type="submit" className="btn btn-primary" style={{ width:'auto', minWidth:220 }}>
                Pay $12 via PayPal
              </button>
            </form>
            <div style={{ width:'100%', maxWidth:320 }}>
              <div style={{ fontSize:13, color:'var(--muted)', marginBottom:8, textAlign:'left' }}>
                After paying, enter your PayPal email to receive your unlock code:
              </div>
              <input
                type="email"
                placeholder="your@email.com"
                value={email}
                onChange={e => setEmail(e.target.value)}
                style={{
                  width:'100%', padding:'11px 14px', border:'1px solid #ccc',
                  borderRadius:4, fontSize:15, fontFamily:'inherit',
                  marginBottom:10, outline:'none'
                }}
              />
              <button className="btn btn-primary" onClick={handlePaid} disabled={loading || !email}
                style={{ width:'100%' }}>
                {loading ? <><span className="spinner" /> Sending code…</> : 'Send My Unlock Code'}
              </button>
            </div>
          </div>
        </>
      )}

      {step === 'code' && (
        <div style={{ width:'100%', maxWidth:320, margin:'0 auto' }}>
          <div style={{ fontSize:13, color:'var(--muted)', marginBottom:12, textAlign:'center' }}>
            A 6-digit code was sent to <strong>{email}</strong>.<br />Check your inbox and enter it below.
          </div>
          <input
            type="text"
            placeholder="Enter 6-digit code"
            value={code}
            onChange={e => setCode(e.target.value.replace(/\D/g, '').slice(0, 6))}
            style={{
              width:'100%', padding:'11px 14px', border:'1px solid #ccc',
              borderRadius:4, fontSize:22, fontFamily:'monospace', letterSpacing:'0.2em',
              marginBottom:10, outline:'none', textAlign:'center'
            }}
          />
          <button className="btn btn-primary" onClick={handleVerify} disabled={loading || code.length !== 6}
            style={{ width:'100%' }}>
            {loading ? <><span className="spinner" /> Verifying…</> : 'Unlock Writing Coach'}
          </button>
          <button onClick={() => setStep('pay')}
            style={{ background:'none', border:'none', color:'var(--muted)', fontSize:12,
              cursor:'pointer', marginTop:10, width:'100%' }}>
            ← Use a different email
          </button>
        </div>
      )}

      {error && <div className="error-box" style={{ marginTop:16 }}>{error}</div>}
      <p style={{ marginTop:16, fontSize:12, color:'var(--muted)' }}>
        Questions? <a href="mailto:support@tinhousepress.com" style={{ color:'var(--amber)' }}>support@tinhousepress.com</a>
      </p>
    </div>
  );
}

// ── Coach Chat ───────────────────────────────────────────────────────────────
const QUICK_PROMPTS = [
  'How do I strengthen my protagonist\'s arc?',
  'What scene should I write next?',
  'How do I raise the stakes in act two?',
  'Help me write a query letter hook',
];

function CoachChat({ form, diagnosis }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [freeUsed, setFreeUsed] = useState(false);
  const [unlocked, setUnlocked] = useState(false);
  const [showPaywall, setShowPaywall] = useState(false);
  const [error, setError] = useState('');
  const bottomRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  async function sendMessage(text) {
    if (!text.trim() || loading) return;
    if (freeUsed && !unlocked) { setShowPaywall(true); return; }

    const userMsg = { role: 'user', content: text.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true); setError('');

    try {
      const res = await fetch('/api/coach', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: newMessages, storyContext: form }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setMessages(m => [...m, { role: 'assistant', content: data.reply }]);
      if (!freeUsed) setFreeUsed(true);
    } catch (e) {
      setError(e.message || 'Could not reach the coach. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  return (
    <>
      <div className="coach-panel">
        <div className="coach-header">
          <div className="coach-icon">✍️</div>
          <div>
            <div className="coach-name">Writing Coach</div>
            <div className="coach-sub">Tailored to your story · {freeUsed && !unlocked ? <span style={{color:'var(--amber)'}}>1 free response used</span> : <span className="free-tag">First response free</span>}</div>
          </div>
        </div>

        <div className="chat-messages">
          {messages.length === 0 && (
            <div style={{ color:'var(--muted)', fontSize:14, fontStyle:'italic', margin:'auto', textAlign:'center', padding:'20px 0' }}>
              Ask me anything about your story. I've read your diagnosis and know your specific premise, protagonist, and conflict.
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`chat-msg ${m.role}`}>
              <div className="msg-avatar">{m.role === 'user' ? 'U' : '✍'}</div>
              <div className="msg-bubble">{m.content}</div>
            </div>
          ))}
          {loading && (
            <div className="chat-msg assistant">
              <div className="msg-avatar">✍</div>
              <div className="msg-bubble" style={{ color:'var(--muted)' }}>
                <span className="spinner" style={{ width:14, height:14, borderWidth:2 }} />
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>

        {messages.length === 0 && (
          <div className="quick-prompts">
            {QUICK_PROMPTS.map((q, i) => (
              <button key={i} className="quick-btn" onClick={() => sendMessage(q)}>{q}</button>
            ))}
          </div>
        )}

        {error && <div className="error-box" style={{ margin:'0 28px 16px' }}>{error}</div>}

        <div className="chat-input-row">
          <input
            placeholder="Ask about your story…"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); } }}
            disabled={loading}
          />
          <button className="btn-send" onClick={() => sendMessage(input)} disabled={loading || !input.trim()}>→</button>
        </div>
      </div>

      {showPaywall && <Paywall onUnlock={() => { setUnlocked(true); setShowPaywall(false); }} />}
    </>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState('form'); // 'form' | 'results' | 'coach'
  const [diagnosis, setDiagnosis] = useState(null);
  const [form, setForm] = useState(null);

  function handleResult(data, f) {
    setDiagnosis(data); setForm(f);
    setPhase('results');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function handleCoach() {
    setPhase('coach');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  return (
    <>


      <div className="hero">
        <div className="eyebrow">Story Diagnosis</div>
        <h1>Is your story <em>ready</em><br />to be written?</h1>
        <p>Get a clinical viability score, identify structural weaknesses, and unlock a writing coach who knows your story — before you write a single chapter.</p>
      </div>

      <PhaseBar phase={phase} />

      <div className="container">
        {phase === 'form' && <DiagnosisForm onResult={handleResult} />}
        {phase === 'results' && diagnosis && (
          <DiagnosisResults data={diagnosis} form={form} onCoach={handleCoach} />
        )}
        {phase === 'coach' && form && (
          <CoachChat form={form} diagnosis={diagnosis} />
        )}
      </div>

      <footer></footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
